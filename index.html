<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>生徒セレクター</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0f0f0f;
  --surface: #1a1a1a;
  --card:    #222222;
  --border:  #2e2e2e;
  --accent:  #4f6ef7;
  --text:    #f0f0f0;
  --sub:     #888;
  --sub2:    #555;
  --teal:    #2dd4bf;
  --red:     #f25c5c;
  --gold:    #f5a623;
  --green:   #3ecf8e;
  --ff:      'Inter', 'Noto Sans JP', sans-serif;
  --radius:  12px;
}
body { background:var(--bg); color:var(--text); font-family:var(--ff); min-height:100vh; font-size:14px; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

@keyframes spin-tick  { 0%,100%{opacity:1;} 50%{opacity:.5;} }
@keyframes pop-in     { 0%{transform:scale(.85);opacity:0;} 60%{transform:scale(1.04);} 100%{transform:scale(1);opacity:1;} }
@keyframes float      { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
@keyframes fade-up    { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
@keyframes confetti   { 0%{transform:translateY(-8px) rotate(0deg);opacity:1;} 100%{transform:translateY(100px) rotate(400deg);opacity:0;} }
@keyframes glow-pulse {
  0%  { box-shadow: 0 0 0 0 rgba(79,110,247,.5); }
  70% { box-shadow: 0 0 0 14px rgba(79,110,247,0); }
  100%{ box-shadow: 0 0 0 0 rgba(79,110,247,0); }
}

/* ── Screens ── */
.screen { display:none; }
.screen.active { display:flex; flex-direction:column; min-height:100vh; animation:fade-up .25s ease; }

/* ── Layout ── */
.center-page {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 20px; max-width:440px; margin:0 auto; width:100%;
}
.logo   { font-size:48px; margin-bottom:20px; }
h1      { font-size:24px; font-weight:700; letter-spacing:-.5px; margin-bottom:6px; }
.lead   { color:var(--sub); font-size:13px; margin-bottom:32px; line-height:1.6; }

/* ── Card ── */
.card   { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:100%; }
.card + .card { margin-top:12px; }
.divider{ border:none; border-top:1px solid var(--border); margin:16px 0; }

/* ── Form ── */
.field  { margin-bottom:16px; }
.field:last-child { margin-bottom:0; }
label   { display:block; font-size:11px; font-weight:600; color:var(--sub); letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
input, textarea {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; font-size:14px; color:var(--text);
  font-family:var(--ff); outline:none; transition:border-color .15s;
}
input:focus, textarea:focus { border-color:var(--accent); }
textarea { resize:vertical; min-height:150px; line-height:1.8; }

/* ── Buttons ── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:none; border-radius:8px; padding:10px 18px;
  font-size:14px; font-weight:600; font-family:var(--ff);
  cursor:pointer; transition:opacity .15s, transform .1s;
  white-space:nowrap;
}
.btn:active  { transform:scale(.97); }
.btn:disabled{ opacity:.35; cursor:not-allowed; }
.btn-full    { width:100%; justify-content:center; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { opacity:.9; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-outline:hover { border-color:var(--sub); }
.btn-ghost   { background:transparent; color:var(--sub); }
.btn-ghost:hover { color:var(--text); }
.btn-google  { background:#fff; color:#333; border:1px solid #ddd; }
.btn-danger  { background:#3a1515; color:var(--red); border:1px solid #5a2020; }
.btn-sm      { padding:7px 12px; font-size:13px; border-radius:7px; }
.btn-stack   { display:flex; flex-direction:column; gap:8px; width:100%; }

/* ── Top bar ── */
#topbar {
  display:none; align-items:center; gap:10px;
  padding:10px 16px; background:var(--surface);
  border-bottom:1px solid var(--border);
  font-size:13px;
}
#topbar-avatar { width:24px; height:24px; border-radius:50%; object-fit:cover; }
#topbar-name   { font-weight:600; }
#topbar-right  { margin-left:auto; display:flex; align-items:center; gap:8px; }

/* ── Header ── */
#header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:12px 16px; display:flex; align-items:center;
  justify-content:space-between; gap:8px; flex-wrap:wrap;
}
.hd-class { font-size:15px; font-weight:700; }
.hd-sub   { font-size:12px; color:var(--sub); margin-top:2px; }
.hd-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

/* ── Toggle ── */
.tog-wrap { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--sub); font-weight:600; }
.tog      { position:relative; width:36px; height:20px; }
.tog input{ opacity:0; width:0; height:0; }
.tog-sl   { position:absolute; cursor:pointer; inset:0; background:var(--sub2); border-radius:20px; transition:.25s; }
.tog-sl::before { content:""; position:absolute; width:14px; height:14px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.25s; }
.tog input:checked + .tog-sl               { background:var(--accent); }
.tog input:checked + .tog-sl::before       { transform:translateX(16px); }

/* ── Progress ── */
#prog-track { height:3px; background:var(--border); }
#prog-fill  { height:100%; background:var(--accent); transition:width .5s ease; }

/* ── Main body ── */
#main-body { flex:1; display:flex; flex-direction:column; overflow:auto; }

/* ── Stage ── */
#stage-wrap { display:flex; flex-direction:column; align-items:center; padding:32px 20px 20px; gap:16px; }
#stage {
  background:var(--card); border:1px solid var(--border);
  border-radius:18px; padding:36px 48px;
  min-width:260px; min-height:150px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; transition:border-color .2s;
}
#stage.animating { border-color:var(--accent); }
#stage.result    { border-color:var(--green); }

#s-empty   { display:flex; flex-direction:column; align-items:center; gap:8px; }
#s-empty .icon { font-size:36px; opacity:.3; }
#s-empty p { font-size:13px; color:var(--sub); }
#s-done    { display:none; flex-direction:column; align-items:center; gap:8px; }
#s-done .icon { font-size:40px; animation:float 2s ease-in-out infinite; }
#s-done p  { font-size:16px; font-weight:700; color:var(--gold); }

#s-avatar  { width:72px; height:72px; border-radius:50%; object-fit:cover; margin-bottom:12px; border:2px solid var(--border); display:none; }
#s-initial { width:72px; height:72px; border-radius:50%; background:var(--surface); border:2px solid var(--border); font-size:28px; font-weight:700; display:none; align-items:center; justify-content:center; margin-bottom:12px; }
#s-name    { font-size:26px; font-weight:700; letter-spacing:-.5px; display:none; }
#s-badge   { margin-top:10px; font-size:12px; font-weight:600; color:var(--green); display:none; }

/* ── Pick button ── */
#pick-btn {
  background:var(--accent); color:#fff;
  border:none; border-radius:50px; padding:16px 48px;
  font-size:20px; font-weight:700; cursor:pointer; font-family:var(--ff);
  transition:transform .1s, opacity .15s;
  animation:glow-pulse 2.5s infinite;
}
#pick-btn:active   { transform:scale(.96); }
#pick-btn:disabled { opacity:.3; cursor:not-allowed; animation:none; }
#pick-btn.spinning { animation:none; }

/* ── Roster ── */
#roster { padding:0 16px 28px; }
.r-head { display:flex; gap:14px; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.r-badge{ display:flex; align-items:center; gap:5px; font-size:12px; color:var(--sub); font-weight:500; }
.r-dot  { width:7px; height:7px; border-radius:50%; }
#chips  { display:flex; flex-wrap:wrap; gap:6px; }

.chip {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:5px 8px 5px 12px;
  display:flex; align-items:center; gap:5px;
  font-size:13px; font-weight:500; transition:all .15s;
}
.chip.absent  { background:#1f1010; border-color:#3a1515; color:var(--sub); }
.chip.called  { background:#0f1f18; border-color:#1a3a2a; }
.chip.called .chip-name { text-decoration:line-through; opacity:.5; }
.chip.absent .chip-name { opacity:.5; }
.chip.current { border-color:var(--gold); background:#1f1a0f; }
.chip-name { font-size:13px; }
.x-btn {
  background:none; border:none; color:var(--sub2);
  font-size:12px; cursor:pointer; padding:1px 4px;
  border-radius:4px; line-height:1; transition:color .15s;
}
.x-btn:hover { color:var(--red); }

/* ── Course grid ── */
#course-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; width:100%; }
.c-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:18px 14px; cursor:pointer;
  text-align:center; transition:all .15s; font-family:var(--ff); color:var(--text);
}
.c-card:hover { border-color:var(--accent); background:var(--surface); }
.c-icon  { font-size:26px; margin-bottom:8px; }
.c-name  { font-size:13px; font-weight:600; line-height:1.4; }
.c-sec   { font-size:11px; color:var(--sub); margin-top:3px; }

/* ── Confetti ── */
#confetti-layer { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
.c-piece { position:absolute; top:35%; animation:confetti 1.4s ease-in forwards; }

@media(max-width:440px) {
  #stage { padding:28px 24px; min-width:0; width:100%; }
  #s-name { font-size:22px; }
  #pick-btn { font-size:18px; padding:14px 36px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="center-page">
    <div class="logo">🎯</div>
    <h1>生徒セレクター</h1>
    <p class="lead" style="text-align:center">Google Classroomと連携して<br>ランダムに生徒を指名します</p>
    <div class="card">
      <div class="btn-stack">
        <button class="btn btn-google btn-full" onclick="doGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Googleでログイン
        </button>
        <p id="login-error" style="color:var(--red);font-size:12px;text-align:center;display:none"></p>
        <hr class="divider" />
        <button class="btn btn-ghost btn-full" onclick="showScreen('screen-manual')" style="font-size:13px">
          手動で名前を入力する
        </button>
      </div>
    </div>
  </div>
</div>

<!-- COURSES -->
<div id="screen-courses" class="screen">
  <div class="center-page" style="max-width:560px">
    <h1 style="align-self:flex-start;margin-bottom:6px">クラスを選択</h1>
    <p class="lead" style="align-self:flex-start;margin-bottom:20px">授業で使うクラスを選んでください</p>
    <div id="course-grid"></div>
    <p id="no-courses" style="color:var(--sub);display:none;margin-top:16px">クラスが見つかりませんでした</p>
    <button class="btn btn-ghost" onclick="doSignOut()" style="margin-top:24px">サインアウト</button>
  </div>
</div>

<!-- MANUAL -->
<div id="screen-manual" class="screen">
  <div class="center-page">
    <h1 style="margin-bottom:6px">手動入力</h1>
    <p class="lead" style="text-align:center;margin-bottom:24px">生徒名を貼り付けてすぐ使えます</p>
    <div class="card">
      <div class="field">
        <label>クラス名</label>
        <input type="text" id="manual-classname" placeholder="例：3年1組" />
      </div>
      <div class="field">
        <label>生徒名（1行に1名）</label>
        <textarea id="manual-names" placeholder="山田 太郎&#10;田中 花子&#10;佐藤 次郎"></textarea>
      </div>
      <div class="btn-stack" style="margin-top:16px">
        <button class="btn btn-primary btn-full" onclick="startManual()">開始する</button>
        <button class="btn btn-ghost btn-full" onclick="showScreen('screen-login')">戻る</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div id="topbar">
    <img id="topbar-avatar" src="" alt="" />
    <span id="topbar-name"></span>
    <div id="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="doSignOut()">サインアウト</button>
    </div>
  </div>

  <div id="header">
    <div>
      <div class="hd-class" id="hd-class"></div>
      <div class="hd-sub"   id="hd-sub"></div>
    </div>
    <div class="hd-right">
      <div class="tog-wrap">
        <span>演出</span>
        <label class="tog">
          <input type="checkbox" id="anim-tog" checked onchange="toggleAnim(this.checked)" />
          <span class="tog-sl"></span>
        </label>
      </div>
      <button class="btn btn-outline btn-sm" onclick="changeClass()">クラス変更</button>
      <div id="reset-confirm" style="display:none; gap:6px; display:none">
        <button class="btn btn-danger btn-sm" onclick="doReset()">リセット確定</button>
        <button class="btn btn-outline btn-sm" onclick="cancelReset()">キャンセル</button>
      </div>
      <button class="btn btn-ghost btn-sm" id="reset-btn" onclick="confirmReset()" style="color:var(--sub)">リセット</button>
    </div>
  </div>

  <div id="prog-track"><div id="prog-fill" style="width:0%"></div></div>

  <div id="main-body">
    <div id="stage-wrap">
      <div id="stage">
        <div id="s-empty"><div class="icon">🎯</div><p>ボタンを押して指名</p></div>
        <div id="s-done" style="display:none"><div class="icon">🎉</div><p>全員指名完了！</p></div>
        <img id="s-avatar" src="" alt="" />
        <div id="s-initial"></div>
        <div id="s-name"></div>
        <div id="s-badge">✓ 当たり！</div>
      </div>

      <button id="pick-btn" onclick="pickStudent()">当てる！</button>
      <button id="undo-btn" class="btn btn-ghost btn-sm" onclick="undoLast()" style="display:none">↩ 取り消し</button>
    </div>

    <div id="roster">
      <div class="r-head">
        <div class="r-badge"><div class="r-dot" style="background:var(--teal)"></div><span id="b-avail"></span></div>
        <div class="r-badge"><div class="r-dot" style="background:var(--red)"></div><span id="b-absent"></span></div>
        <div class="r-badge"><div class="r-dot" style="background:var(--sub2)"></div><span id="b-called"></span></div>
      </div>
      <div id="chips"></div>
    </div>
  </div>
</div>

<div id="confetti-layer"></div>

<script src="https://apis.google.com/js/api.js"       async onload="onGapiLoad()"></script>
<script src="https://accounts.google.com/gsi/client"  async onload="onGisLoad()"></script>
<script>
/* ── ▼ここだけ書き換えてデプロイ▼ ── */
const CLIENT_ID = '448776260349-7lb41ijeh6sl133e6ucnsa8qu5e4i8dv.apps.googleusercontent.com';
/* ── ▲ここだけ▲ ── */

/* ── Storage（Claude artifact / localStorage 両対応） ── */
const store = {
  get: async (k) => {
    try {
      if (window.storage) return await window.storage.get(k);
      const v = localStorage.getItem(k);
      return v ? { value: v } : null;
    } catch { return null; }
  },
  set: async (k, v) => {
    try {
      if (window.storage) await window.storage.set(k, v);
      else localStorage.setItem(k, v);
    } catch {}
  },
  del: async (k) => {
    try {
      if (window.storage) await window.storage.delete(k);
      else localStorage.removeItem(k);
    } catch {}
  },
};

/* ── State ── */
const SCOPES    = 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.rosters.readonly https://www.googleapis.com/auth/userinfo.profile';
const DISCOVERY = 'https://classroom.googleapis.com/$discovery/rest?version=v1';
let gapiReady=false, gisReady=false, tokenClient=null, userProfile=null;
let students=[], absentIds=new Set(), calledIds=new Set();
let current=null, animating=false, animOn=true, classId='', className='', isManual=false;

/* ── Screen ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── Google ── */
function onGapiLoad() { window.gapi.load('client', ()=>{ gapiReady=true; tryInit(); }); }
function onGisLoad()  { gisReady=true; tryInit(); }
async function tryInit() {
  if (!gapiReady||!gisReady) return;
  try {
    await window.gapi.client.init({ discoveryDocs:[DISCOVERY] });
    tokenClient = window.google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES, callback: handleToken,
    });
  } catch(e) { console.error(e); }
}

function doGoogleLogin() {
  const el = document.getElementById('login-error'); el.style.display='none';
  if (!tokenClient) { el.textContent='初期化中です。少し待ってから再試行してください。'; el.style.display='block'; return; }
  tokenClient.requestAccessToken({ prompt:'' });
}

async function handleToken(resp) {
  if (resp.error) { showLoginErr('ログインエラー: '+resp.error); return; }
  try {
    const pr = await window.gapi.client.request({ path:'https://www.googleapis.com/oauth2/v1/userinfo' });
    userProfile = pr.result;
    const r = await window.gapi.client.classroom.courses.list({ courseStates:['ACTIVE'], pageSize:30 });
    renderCourses(r.result.courses||[]);
    showScreen('screen-courses');
  } catch(e) { showLoginErr('取得エラー: '+e.message); }
}

function showLoginErr(msg) { const e=document.getElementById('login-error'); e.textContent=msg; e.style.display='block'; }

function doSignOut() {
  try { window.google?.accounts.oauth2.revoke(window.gapi.client.getToken()?.access_token??'',()=>{}); window.gapi.client.setToken(null); } catch{}
  userProfile=null; students=[]; absentIds=new Set(); calledIds=new Set(); current=null;
  document.getElementById('topbar').style.display='none';
  showScreen('screen-login');
}

/* ── Courses ── */
function renderCourses(list) {
  const g=document.getElementById('course-grid'); g.innerHTML='';
  document.getElementById('no-courses').style.display = list.length?'none':'block';
  list.forEach(c=>{
    const btn=document.createElement('button'); btn.className='c-card';
    btn.innerHTML=`<div class="c-icon">📋</div><div class="c-name">${esc(c.name)}</div>${c.section?`<div class="c-sec">${esc(c.section)}</div>`:''}`;
    btn.onclick=()=>loadCourse(c); g.appendChild(btn);
  });
}
async function loadCourse(c) {
  try {
    const r=await window.gapi.client.classroom.courses.students.list({courseId:c.id,pageSize:200});
    const list=(r.result.students||[]).map(s=>({id:s.userId,name:s.profile.name.fullName,photo:s.profile.photoUrl||null}));
    isManual=false; await openClass(c.id,c.name,list);
  } catch(e) { alert('生徒取得エラー: '+e.message); }
}

/* ── Manual ── */
function startManual() {
  const names=document.getElementById('manual-names').value.split('\n').map(n=>n.trim()).filter(Boolean);
  if (!names.length) { alert('生徒名を入力してください'); return; }
  const cname=document.getElementById('manual-classname').value.trim()||'クラス';
  isManual=true; openClass('manual_'+Date.now(), cname, names.map((n,i)=>({id:'m'+i,name:n,photo:null})));
}

/* ── Open class ── */
async function openClass(id, name, list) {
  classId=id; className=name; students=list;
  absentIds=new Set(); current=null; animating=false;
  const saved = await store.get('called_'+id);
  calledIds = saved ? new Set(JSON.parse(saved.value)) : new Set();
  if (!isManual && userProfile) {
    const tb=document.getElementById('topbar'); tb.style.display='flex';
    document.getElementById('topbar-name').textContent=userProfile.name;
    if (userProfile.picture) document.getElementById('topbar-avatar').src=userProfile.picture;
  } else { document.getElementById('topbar').style.display='none'; }
  renderMain(); showScreen('screen-main');
}

/* ── Render ── */
function renderMain() {
  const avail=getAvail(), total=students.length-absentIds.size;
  const pct=total>0?Math.round(calledIds.size/total*100):0, allDone=avail.length===0&&students.length>0;
  document.getElementById('hd-class').textContent = className;
  document.getElementById('hd-sub').textContent   = `残り ${avail.length}名 ／ 全${total}名指名`;
  document.getElementById('prog-fill').style.width= pct+'%';
  document.getElementById('b-avail').textContent  = `出席 ${avail.length}`;
  document.getElementById('b-absent').textContent = `欠席 ${absentIds.size}`;
  document.getElementById('b-called').textContent = `指名済 ${calledIds.size}`;
  if (!current) setStageIdle(allDone);
  const btn=document.getElementById('pick-btn');
  btn.disabled=animating||allDone; btn.textContent=allDone?'全員完了':'当てる！';
  btn.style.animation=(!animating&&!allDone&&animOn)?'glow-pulse 2.5s infinite':'none';
  renderChips();
}

function setStageIdle(allDone) {
  document.getElementById('s-empty').style.display  =allDone?'none':'flex';
  document.getElementById('s-done').style.display   =allDone?'flex':'none';
  document.getElementById('s-avatar').style.display ='none';
  document.getElementById('s-initial').style.display='none';
  document.getElementById('s-name').style.display   ='none';
  document.getElementById('s-badge').style.display  ='none';
  document.getElementById('stage').className        ='';
}

function showOnStage(s, isResult) {
  ['s-empty','s-done'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('s-name').style.display=document.getElementById('s-name').textContent=s.name,'block';
  document.getElementById('s-name').textContent=s.name;
  document.getElementById('s-name').style.display='block';
  if (s.photo) {
    document.getElementById('s-avatar').src=s.photo;
    document.getElementById('s-avatar').style.display='block';
    document.getElementById('s-initial').style.display='none';
  } else {
    document.getElementById('s-initial').textContent=s.name.charAt(0);
    document.getElementById('s-initial').style.display='flex';
    document.getElementById('s-avatar').style.display='none';
  }
  if (isResult&&!animating) {
    document.getElementById('s-badge').style.display='block';
    document.getElementById('stage').className='result';
    if(animOn) document.getElementById('s-name').style.animation='pop-in .35s ease';
  } else {
    document.getElementById('s-badge').style.display='none';
    document.getElementById('stage').className=animating?'animating':'';
    document.getElementById('s-name').style.animation=(animOn&&animating)?'spin-tick .15s infinite':'none';
  }
}

/* ── Pick ── */
function getAvail() { return students.filter(s=>!absentIds.has(s.id)&&!calledIds.has(s.id)); }

function pickStudent() {
  if (animating) return;
  const avail=getAvail(); if(!avail.length) return;
  animating=true; current=null;
  document.getElementById('undo-btn').style.display='none';
  document.getElementById('s-badge').style.display='none';
  const btn=document.getElementById('pick-btn');
  btn.textContent='選択中…'; btn.disabled=true; btn.style.animation='none';
  document.getElementById('stage').className='animating';
  if (animOn) runSlot(avail, s=>showOnStage(s,false), onDone);
  else onDone(avail[Math.floor(Math.random()*avail.length)]);
}

function onDone(s) {
  animating=false; current=s;
  showOnStage(s,true);
  calledIds.add(s.id);
  store.set('called_'+classId, JSON.stringify([...calledIds]));
  const avail=getAvail(), total=students.length-absentIds.size;
  const allDone=avail.length===0, pct=total>0?Math.round(calledIds.size/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('hd-sub').textContent=`残り ${avail.length}名 ／ 全${total}名指名`;
  document.getElementById('b-avail').textContent=`出席 ${avail.length}`;
  document.getElementById('b-called').textContent=`指名済 ${calledIds.size}`;
  const btn=document.getElementById('pick-btn');
  btn.disabled=allDone; btn.textContent=allDone?'全員完了':'当てる！';
  btn.style.animation=(!allDone&&animOn)?'glow-pulse 2.5s infinite':'none';
  document.getElementById('undo-btn').style.display='inline-flex';
  renderChips();
  if(animOn) doConfetti();
}

function runSlot(pool, tick, done) {
  let f=0;
  const go=()=>{
    f++;
    const d=f<12?55:f<22?110:f<27?200:380;
    setTimeout(()=>{ const p=pool[Math.floor(Math.random()*pool.length)]; if(f<28){tick(p);go();}else done(pool[Math.floor(Math.random()*pool.length)]); },d);
  };
  go();
}

/* ── Undo ── */
function undoLast() {
  if (!current||animating) return;
  calledIds.delete(current.id);
  store.set('called_'+classId, JSON.stringify([...calledIds]));
  current=null;
  document.getElementById('undo-btn').style.display='none';
  renderMain();
}

/* ── Absent ── */
function toggleAbsent(id) {
  absentIds.has(id)?absentIds.delete(id):absentIds.add(id);
  const avail=getAvail(),total=students.length-absentIds.size,pct=total>0?Math.round(calledIds.size/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('hd-sub').textContent=`残り ${avail.length}名 ／ 全${total}名指名`;
  document.getElementById('b-avail').textContent=`出席 ${avail.length}`;
  document.getElementById('b-absent').textContent=`欠席 ${absentIds.size}`;
  const btn=document.getElementById('pick-btn');
  const allDone=avail.length===0&&students.length>0;
  btn.disabled=allDone||animating; btn.textContent=allDone?'全員完了':'当てる！';
  renderChips();
}

/* ── Chips ── */
function renderChips() {
  const g=document.getElementById('chips'); g.innerHTML='';
  students.forEach(s=>{
    const isAbs=absentIds.has(s.id),isCalled=calledIds.has(s.id),isCur=current?.id===s.id&&!animating;
    const c=document.createElement('div');
    c.className='chip'+(isAbs?' absent':isCalled?' called':'')+(isCur?' current':'');
    c.innerHTML=`<span class="chip-name">${isAbs?'🚫 ':isCalled?'✓ ':''}${esc(s.name)}</span><button class="x-btn" onclick="toggleAbsent('${s.id}')" title="${isAbs?'出席に戻す':'欠席にする'}">${isAbs?'↩':'✕'}</button>`;
    g.appendChild(c);
  });
}

/* ── Reset ── */
function confirmReset() { document.getElementById('reset-btn').style.display='none'; document.getElementById('reset-confirm').style.display='flex'; }
function cancelReset()  { document.getElementById('reset-btn').style.display=''; document.getElementById('reset-confirm').style.display='none'; }
function doReset() {
  calledIds=new Set(); absentIds=new Set(); current=null; animating=false;
  store.del('called_'+classId); cancelReset();
  renderMain(); setStageIdle(false);
  document.getElementById('undo-btn').style.display='none';
}

function changeClass() { showScreen(isManual?'screen-manual':'screen-courses'); }

/* ── Anim toggle ── */
function toggleAnim(on) {
  animOn=on;
  const btn=document.getElementById('pick-btn');
  if(!btn.disabled) btn.style.animation=on?'glow-pulse 2.5s infinite':'none';
}

/* ── Confetti ── */
function doConfetti() {
  const l=document.getElementById('confetti-layer'); l.innerHTML='';
  for(let i=0;i<20;i++){
    const el=document.createElement('div'); el.className='c-piece';
    const sz=5+Math.random()*8, h=Math.floor(Math.random()*360);
    el.style.cssText=`left:${20+Math.random()*60}%;width:${sz}px;height:${sz}px;background:hsl(${h},85%,65%);border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${(Math.random()*.4).toFixed(2)}s;`;
    l.appendChild(el);
  }
  setTimeout(()=>l.innerHTML='',2000);
}

/* ── Util ── */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
